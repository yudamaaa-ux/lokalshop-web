<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Produk - LOKAL SHOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4 py-10">

    <div class="bg-white w-full max-w-2xl rounded-xl shadow-md p-6 border-t-4 border-blue-600">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-700">Tambah Produk / Menu</h2>

        <form id="formProduk" onsubmit="simpanProduk(event)" class="space-y-6">
            
            <!-- Memilih Toko (Wajib) -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Pilih Toko Anda <span class="text-red-500">*</span></label>
                <select id="pilihToko" required class="w-full border rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-700">
                    <option value="" disabled selected>Memuat daftar toko...</option>
                </select>
            </div>

            <!-- BAGIAN 1: INFORMASI PRODUK -->
            <div class="bg-gray-50 p-4 rounded-lg border">
                <h3 class="font-bold text-gray-800 border-b pb-2 mb-3">1. Informasi Produk</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Nama Produk</label>
                        <input type="text" id="namaProduk" required class="w-full border rounded-lg px-3 py-2" placeholder="Contoh: Keripik Singkong Pedas Manis 200g">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Kategori Produk</label>
                        <select id="kategoriProduk" required class="w-full border rounded-lg px-3 py-2 bg-white">
                            <option value="Makanan & Minuman">Makanan & Minuman</option>
                            <option value="Fashion">Fashion</option>
                            <option value="Pertanian">Pertanian</option>
                            <option value="Sembako">Sembako</option>
                            <option value="Jasa">Jasa</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Deskripsi Ringkas</label>
                        <textarea id="deskripsiProduk" rows="2" class="w-full border rounded-lg px-3 py-2" placeholder="Jelaskan rasa, bahan, atau keunggulannya..."></textarea>
                    </div>
                </div>
            </div>

            <!-- BAGIAN 2: HARGA & STOK -->
            <div class="bg-gray-50 p-4 rounded-lg border">
                <h3 class="font-bold text-gray-800 border-b pb-2 mb-3">2. Harga & Stok</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Harga Jual (Rp)</label>
                        <input type="number" id="hargaProduk" required class="w-full border rounded-lg px-3 py-2" placeholder="Contoh: 15000">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Status Stok</label>
                        <div class="space-y-1">
                            <label class="flex items-center space-x-2 text-sm"><input type="radio" name="statusStok" value="Ready Stock" checked class="text-blue-600"> <span>Ready Stock (Siap Kirim)</span></label>
                            <label class="flex items-center space-x-2 text-sm"><input type="radio" name="statusStok" value="Pre-Order" class="text-blue-600"> <span>Pre-Order (Pesan Dulu)</span></label>
                            <label class="flex items-center space-x-2 text-sm"><input type="radio" name="statusStok" value="Stok Terbatas" class="text-blue-600"> <span>Stok Terbatas</span></label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BAGIAN 3: VARIAN -->
            <div class="bg-gray-50 p-4 rounded-lg border">
                <h3 class="font-bold text-gray-800 border-b pb-2 mb-3">3. Varian <span class="text-gray-400 font-normal text-sm">(Opsional)</span></h3>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Pilihan Varian / Rasa / Ukuran</label>
                    <input type="text" id="varianProduk" class="w-full border rounded-lg px-3 py-2" placeholder="Contoh: Pedas, Original / Ukuran S, M, L">
                </div>
            </div>

            <!-- BAGIAN 4: FOTO & PENGIRIMAN -->
            <div class="bg-gray-50 p-4 rounded-lg border">
                <h3 class="font-bold text-gray-800 border-b pb-2 mb-3">4. Foto & Pengiriman</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Foto Produk Utama (Upload)</label>
                        <!-- Input File untuk menerima gambar -->
                        <input type="file" id="fotoFile" accept="image/*" required class="w-full border rounded-lg px-3 py-2 bg-white">
                        <p class="text-xs text-gray-500 mt-1">*Pastikan foto jelas dan terang agar menarik pembeli.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Opsi Pengiriman (Bisa pilih > 1)</label>
                        <div class="space-y-1">
                            <label class="flex items-center space-x-2 text-sm"><input type="checkbox" value="Bisa Dikirim" class="opsi-pengiriman text-blue-600"> <span>Bisa Dikirim (Kurir Lokal/COD)</span></label>
                            <label class="flex items-center space-x-2 text-sm"><input type="checkbox" value="Ambil Sendiri di Toko" class="opsi-pengiriman text-blue-600"> <span>Ambil Sendiri di Toko</span></label>
                            <label class="flex items-center space-x-2 text-sm"><input type="checkbox" value="COD" class="opsi-pengiriman text-blue-600"> <span>COD</span></label>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSimpan" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                Simpan & Upload Produk
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="index.html" class="text-sm text-blue-600 hover:underline">Kembali ke Beranda</a>
        </div>
    </div>

    <script src="tambah-produk.js"></script>
</body>
</html>

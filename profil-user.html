<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun Saya - LOKAL SHOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen pb-24">

    <!-- NAVIGASI ATAS -->
    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-green-600 text-white flex items-center justify-center rounded-lg font-black text-sm shadow-md">LS</div>
                <span class="text-xl font-black text-green-600 tracking-tight hidden sm:block">LOKAL<span class="text-gray-800">SHOP</span></span>
            </a>
            <a href="index.html" class="text-xs font-bold text-gray-500 hover:text-green-600 transition">← Belanja Lagi</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6">
        
        <!-- KARTU INFO AKUN -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-200 mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl font-black shadow-inner">👤</div>
                <div>
                    <h2 class="text-xl font-black text-gray-800" id="userEmail">Memuat Akun...</h2>
                    <p class="text-xs text-gray-500 font-bold mt-1">Pelanggan Setia Lokal Shop</p>
                </div>
            </div>
            <button onclick="logoutAkun()" class="bg-red-50 hover:bg-red-500 text-red-600 hover:text-white font-bold px-5 py-2.5 rounded-xl text-xs transition border border-red-100 w-full md:w-auto">
                Keluar Akun (Logout)
            </button>
        </div>

        <h3 class="font-black text-lg text-gray-800 mb-4 border-b pb-2">📦 Lacak Pesanan Saya</h3>
        
        <!-- DAFTAR PESANAN PEMBELI -->
        <div id="daftarPesananSaya" class="space-y-4">
            <div class="text-center py-10 text-gray-400 font-bold text-sm">Memuat riwayat pesanan Anda...</div>
        </div>

    </main>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const { createClient } = supabase;
        const supabaseUrl = 'https://snclpxrtxjwefzrmkylo.supabase.co'; 
        const supabaseKey = 'sb_publishable_Sw_2GbforFsxCsf8zIwDJw_a3XuRnjl';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);
        // ----------------------------

        let akunUser = null;

        async function muatProfilDanPesanan() {
            try {
                // 1. Cek Login
                const { data: { user }, error: errAuth } = await supabaseClient.auth.getUser();
                if (errAuth || !user) {
                    alert("Sesi Anda telah habis. Silakan login kembali.");
                    window.location.href = "login.html";
                    return;
                }
                akunUser = user;
                document.getElementById('userEmail').innerText = user.email;

                // 2. Ambil Riwayat Pesanan dari Database
                const wadah = document.getElementById('daftarPesananSaya');
                const { data: pesananList, error: errPesanan } = await supabaseClient
                    .from('pesanan')
                    .select('*, toko(*), produk(*)')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                if (errPesanan) throw errPesanan;

                if (pesananList.length === 0) {
                    wadah.innerHTML = `
                        <div class="bg-white p-10 rounded-3xl border border-dashed border-gray-300 text-center">
                            <div class="text-4xl mb-3">🛍️</div>
                            <h4 class="font-black text-gray-800 mb-1">Belum Ada Pesanan</h4>
                            <p class="text-xs text-gray-500 mb-4">Ayo mulai belanja produk lokal terbaik di sekitar Anda!</p>
                            <a href="index.html" class="bg-green-600 text-white text-xs font-bold px-5 py-2.5 rounded-xl shadow-md">Mulai Belanja</a>
                        </div>
                    `;
                    return;
                }

                wadah.innerHTML = '';
                pesananList.forEach(p => {
                    const totalFmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(p.total_harga);
                    const namaToko = p.toko ? p.toko.nama_toko : 'Toko Tidak Diketahui';
                    const namaProduk = p.produk ? p.produk.nama_produk : 'Produk Telah Dihapus';
                    
                    // Cek foto produk aman
                    let fotoProduk = 'https://via.placeholder.com/100';
                    if (p.produk) {
                        fotoProduk = p.produk.foto1 || p.produk.foto_url || fotoProduk;
                    }

                    const tanggal = new Date(p.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

                    // Warna Status Interaktif
                    let warnaStatus = 'bg-gray-100 text-gray-600';
                    if (p.status === 'Menunggu Konfirmasi') warnaStatus = 'bg-amber-100 text-amber-700 font-bold animate-pulse';
                    if (p.status === 'Diproses') warnaStatus = 'bg-blue-100 text-blue-700 font-bold';
                    if (p.status === 'Selesai') warnaStatus = 'bg-green-100 text-green-700 font-bold';
                    if (p.status === 'Dibatalkan') warnaStatus = 'bg-red-100 text-red-700 font-bold';

                    wadah.innerHTML += `
                        <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-gray-200 flex flex-col md:flex-row gap-4 items-start md:items-center transition hover:shadow-md">
                            <img src="${fotoProduk}" class="w-16 h-16 rounded-xl object-cover border border-gray-100 flex-shrink-0">
                            <div class="flex-grow w-full">
                                <div class="flex justify-between items-start mb-1">
                                    <span class="text-[10px] text-gray-400 font-bold">${tanggal}</span>
                                    <span class="px-2 py-1 rounded-lg text-[10px] ${warnaStatus}">${p.status}</span>
                                </div>
                                <h4 class="font-black text-sm text-gray-800 line-clamp-1">${namaProduk}</h4>
                                <p class="text-[11px] text-indigo-600 font-bold mb-2">🏪 ${namaToko}</p>
                                <div class="flex justify-between items-center mt-3 pt-3 border-t border-gray-50">
                                    <span class="text-xs text-gray-500">Jumlah: ${p.qty} pcs</span>
                                    <span class="font-black text-green-600 text-sm">Total: ${totalFmt}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                console.error("Gagal muat pesanan", err);
                // Perbaikan Syntax Error ada di baris ini:
                document.getElementById('daftarPesananSaya').innerHTML = `<p class="text-center text-red-500 text-xs font-bold">Terjadi kesalahan saat memuat pesanan Anda.</p>`;
            }
        }

        async function logoutAkun() {
            if(confirm("Yakin ingin keluar dari akun?")) {
                await supabaseClient.auth.signOut();
                window.location.href = "index.html";
            }
        }

        muatProfilDanPesanan();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buka Toko - LOKAL SHOP</title>
    <!-- Memanggil Tailwind CSS untuk desain -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Memanggil library Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4 py-10">

    <div class="bg-white w-full max-w-xl rounded-xl shadow-md p-6 md:p-8 border-t-4 border-green-600">
        <h2 class="text-2xl font-bold text-center mb-1 text-green-700">Buka Toko LOKAL</h2>
        <p class="text-center text-gray-500 text-sm mb-6">Daftar sekarang, otomatis dapat kuota saldo Rp 15.000!</p>

        <!-- Formulir Pendaftaran -->
        <form id="formDaftar" onsubmit="daftarToko(event)" class="space-y-4">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nama Toko <span class="text-red-500">*</span></label>
                    <input type="text" id="namaToko" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Contoh: Warung Makmur">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nama Pemilik <span class="text-gray-400 font-normal">(Opsional)</span></label>
                    <input type="text" id="namaPemilik" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Nama Anda">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Kategori Usaha <span class="text-red-500">*</span></label>
                <select id="kategori" required class="w-full border rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-green-500 outline-none">
                    <option value="" disabled selected>-- Pilih Kategori --</option>
                    <option value="Fashion & Aksesoris">Fashion & Aksesoris</option>
                    <option value="Kecantikan & Perawatan Diri">Kecantikan & Perawatan Diri</option>
                    <option value="Makanan & Minuman">Makanan & Minuman</option>
                    <option value="Kebutuhan Rumah Tangga & Gaya Hidup">Kebutuhan Rumah Tangga & Gaya Hidup</option>
                    <option value="Karya Seni & Kerajinan">Karya Seni & Kerajinan</option>
                    <option value="Jasa & Servis">Jasa & Servis</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Nomor WhatsApp <span class="text-red-500">*</span></label>
                <div class="flex">
                    <span class="inline-flex items-center px-3 text-sm text-gray-700 bg-gray-100 border border-r-0 border-gray-300 rounded-l-lg font-bold">+62</span>
                    <input type="number" id="noWA" required class="w-full border rounded-none rounded-r-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="81234567890">
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Kelurahan / Desa <span class="text-red-500">*</span></label>
                    <input type="text" id="kelurahan" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Kelurahan">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Kecamatan <span class="text-red-500">*</span></label>
                    <input type="text" id="kecamatan" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Kecamatan">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="block text-sm font-bold text-gray-700 mb-1">RT / RW <span class="text-red-500">*</span></label>
                    <input type="text" id="rtrw" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="RT 01 / RW 02">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Lokasi Spesifik <span class="text-gray-400 font-normal">(Opsional)</span></label>
                <input type="text" id="lokasiSpesifik" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Contoh: Depan pos kamling, pagar biru">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Tentang Toko <span class="text-gray-400 font-normal">(Opsional)</span></label>
                <textarea id="tentangToko" rows="2" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Ceritakan sedikit tentang produk atau jasa Anda..."></textarea>
            </div>

            <button type="submit" id="btnDaftar" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition mt-6">
                Daftar & Klaim Saldo
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="index.html" class="text-sm text-green-600 hover:underline">Kembali ke Beranda</a>
        </div>
    </div>

    <!-- Memanggil file logika JavaScript pendaftaran -->
    <script src="daftar.js"></script>
</body>
</html>
